services:
  db:
    image: postgres:15-alpine
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_DB: fleetcontrol_puj
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fleetcontrol_puj"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    platform: linux/amd64
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fleetcontrol_puj
      JWT_SECRET: fleet_puj_demo_secret_2025
      JWT_EXPIRES_IN: 8h
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://backend:4000
      RESEND_API_KEY: re_TTGRjkqT_B523jaWuUJRBnvwDWwuz6iNA
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app:Z
      - backend_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const net=require('net');const s=net.connect(4000,'127.0.0.1',()=>process.exit(0));s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000);"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    platform: linux/amd64
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:Z
      - frontend_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const net=require('net');const s=net.connect(3000,'127.0.0.1',()=>process.exit(0));s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000);"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    platform: linux/amd64
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
    volumes:
      - ./simulator:/app:Z
      - simulator_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
  simulator_node_modules:
