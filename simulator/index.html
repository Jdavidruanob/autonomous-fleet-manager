<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Flota</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background: #f4f4f5;
      color: #1a1a2e;
      padding: 24px;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 0.875rem; color: #6b7280; margin-bottom: 24px; }
    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    }
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .card-header .icon {
      width: 40px; height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .card-header .icon.robot { background: #dbeafe; color: #1d4ed8; }
    .card-header .icon.drone { background: #e0f2fe; color: #0369a1; }
    .card-header .info .code { font-weight: 600; font-size: 0.95rem; }
    .card-header .info .type { font-size: 0.75rem; color: #6b7280; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 0.75rem; font-weight: 500; color: #6b7280; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input, .field select {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.875rem;
      outline: none;
    }
    .field input:focus, .field select:focus { border-color: #1d4ed8; }
    .battery-row { display: flex; align-items: center; gap: 10px; }
    .battery-row input[type="range"] { flex: 1; }
    .battery-row span { font-size: 0.875rem; font-weight: 500; min-width: 40px; text-align: right; }
    .battery-bar {
      height: 6px;
      background: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }
    .battery-bar .fill { height: 100%; transition: width 0.2s; }
    .battery-bar .fill.low { background: #dc2626; }
    .battery-bar .fill.medium { background: #d97706; }
    .battery-bar .fill.high { background: #16a34a; }
    .sub-status-group { display: none; }
    .sub-status-group.visible { display: block; }
    .recording-group { display: none; }
    .recording-group.visible { display: block; }
    .buttons { display: flex; gap: 8px; margin-top: 16px; }
    .btn {
      flex: 1;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #1d4ed8; color: white; }
    .btn-secondary { background: #6b7280; color: white; }
    .btn-outline { background: white; border: 1px solid #d1d5db; color: #374151; }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .status-badge.available { background: #dcfce7; color: #166534; }
    .status-badge.in_mission { background: #dbeafe; color: #1e40af; }
    .status-badge.blocked { background: #fee2e2; color: #991b1b; }
    .status-badge.sub { background: #f3f4f6; color: #6b7280; font-weight: 400; }
    .route-display {
      font-size: 0.8rem;
      color: #374151;
      padding: 6px 10px;
      background: #f3f4f6;
      border-radius: 6px;
      margin-top: 8px;
    }
    .route-display span { font-weight: 500; }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 16px;
      background: #1a1a2e;
      color: white;
      border-radius: 8px;
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }
    .loading { color: #6b7280; font-size: 0.875rem; }
  </style>
</head>
<body>
  <h1>Simulador de Flota</h1>
  <p>Controla el estado de los dispositivos y simula rutas.</p>
  <div id="app" class="loading">Cargando dispositivos...</div>
  <div id="toast" class="toast"></div>

  <script>
    const BACKEND_URL = "http://localhost:4000";
    const SIM_URL = "";
    const CAMPUS_POINTS = [
      "Edificio Almendros", "Biblioteca General", "Cafeteria Central",
      "Edificio Cedros", "Auditorio Mayor", "Edificio El Saman",
      "Cancha Multiple", "Porteria Principal"
    ];

    let devices = [];
    let toastTimer = null;

    function showToast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
    }

    function batteryColor(level) {
      if (level < 20) return "low";
      if (level < 40) return "medium";
      return "high";
    }

    function statusLabel(status) {
      return { available: "Disponible", in_mission: "En servicio", blocked: "Bloqueado" }[status] || status;
    }

    function subStatusLabel(sub) {
      return { en_base: "En base", cargando: "En base · Cargando", bateria_baja: "Batería baja", sin_senal: "Sin señal", mantenimiento: "Mantenimiento" }[sub] || sub || "";
    }

    async function fetchDevices() {
      try {
        const res = await fetch(`${SIM_URL}/api/devices`);
        if (!res.ok) throw new Error("Failed");
        devices = await res.json();
        render();
      } catch {
        try {
          const res = await fetch(`${BACKEND_URL}/api/devices`);
          devices = await res.json();
          render();
        } catch (e) {
          document.getElementById("app").innerHTML = "Error cargando dispositivos.";
        }
      }
    }

    async function updateDevice(id, body) {
      try {
        await fetch(`${SIM_URL}/api/devices/${id}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
        showToast("Dispositivo actualizado");
        fetchDevices();
      } catch {
        try {
          await fetch(`${BACKEND_URL}/api/devices/${id}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
          showToast("Dispositivo actualizado");
          fetchDevices();
        } catch {
          showToast("Error al actualizar dispositivo");
        }
      }
    }

    async function sendTelemetry(device) {
      const body = {
        deviceId: device.id,
        latitude: device.base_latitude || 3.345,
        longitude: device.base_longitude || -76.53,
        batteryLevel: device.batteryLevel,
        speed: 5,
        missionStatus: device.currentRoute ? `${device.currentRoute.origin} → ${device.currentRoute.destination}` : null,
        signalLost: device.subStatus === "sin_senal",
      };
      try {
        await fetch(`${SIM_URL}/api/telemetry`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
        showToast("Telemetría enviada");
      } catch {
        try {
          await fetch(`${BACKEND_URL}/api/telemetry`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
          showToast("Telemetría enviada");
        } catch {
          showToast("Error al enviar telemetría");
        }
      }
    }

    async function simulateRoute(id, deviceType) {
      if (deviceType === "drone") return;
      try {
        const res = await fetch(`${SIM_URL}/api/simulate-route/${id}`, { method: "POST" });
        const data = await res.json();
        showToast(`Ruta simulada: ${data.route.origin} → ${data.route.destination}`);
        fetchDevices();
      } catch {
        try {
          const devices = await fetch(`${BACKEND_URL}/api/devices`).then(r => r.json());
          const device = devices.find(d => d.id === id);
          if (!device) return;

          const shuffled = [...CAMPUS_POINTS].sort(() => Math.random() - 0.5);
          const origin = shuffled[0];
          const destination = shuffled[1];

          await fetch(`${BACKEND_URL}/api/devices/${id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: "in_mission", subStatus: null, currentRoute: { origin, destination } }),
          });
          showToast(`Ruta simulada: ${origin} → ${destination}`);
          fetchDevices();
        } catch {
          showToast("Error al simular ruta");
        }
      }
    }

    async function startRecording(id, location) {
      await fetch(`${BACKEND_URL}/api/devices/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: "in_mission", subStatus: null, currentRoute: { origin: location, destination: location } }),
      });
      showToast(`Grabando en: ${location}`);
      fetchDevices();
    }

    function render() {
      const grid = document.getElementById("app");
      if (!devices.length) {
        grid.innerHTML = "No se encontraron dispositivos.";
        return;
      }

      grid.className = "grid";
      grid.innerHTML = devices.map(d => `
        <div class="card" data-id="${d.id}">
          <div class="card-header">
            <div class="icon ${d.type}">${d.type === "robot" ? "RBT" : "DRN"}</div>
            <div class="info">
              <div class="code">${d.code}</div>
              <div class="type">${d.type === "robot" ? "Robot terrestre" : "Dron"}</div>
            </div>
            <div style="margin-left:auto;text-align:right">
              <span class="status-badge ${d.status}">${statusLabel(d.status)}</span>
              ${d.subStatus ? `<br><span class="status-badge sub" style="margin-top:4px">${subStatusLabel(d.subStatus)}</span>` : ""}
            </div>
          </div>

          ${d.status === "in_mission" && d.currentRoute ? `
            <div class="route-display">
              ${d.type === "drone" ? "🎥 " : ""}<span>${d.currentRoute.origin}</span>${d.currentRoute.origin !== d.currentRoute.destination ? ` → <span>${d.currentRoute.destination}</span>` : ""}
            </div>
          ` : ""}

          <div class="field">
            <label>Batería</label>
            <div class="battery-row">
              <input type="range" min="0" max="100" value="${d.batteryLevel}"
                onchange="updateDevice('${d.id}', { batteryLevel: parseInt(this.value) })">
              <span>${d.batteryLevel}%</span>
            </div>
            <div class="battery-bar">
              <div class="fill ${batteryColor(d.batteryLevel)}" style="width:${d.batteryLevel}%"></div>
            </div>
          </div>

          <div class="field">
            <label>Estado</label>
            <select onchange="updateDevice('${d.id}', { status: this.value, subStatus: this.value === 'blocked' ? 'mantenimiento' : (this.value === 'available' ? 'en_base' : null) })">
              <option value="available" ${d.status === "available" ? "selected" : ""}>Disponible</option>
              <option value="in_mission" ${d.status === "in_mission" ? "selected" : ""}>En servicio</option>
              <option value="blocked" ${d.status === "blocked" ? "selected" : ""}>Bloqueado</option>
            </select>
          </div>

          <div class="field sub-status-group ${d.status === "blocked" ? "visible" : ""}">
            <label>Sub-estado (solo cuando está bloqueado)</label>
            <select onchange="updateDevice('${d.id}', { subStatus: this.value })">
              <option value="bateria_baja" ${d.subStatus === "bateria_baja" ? "selected" : ""}>Batería baja</option>
              <option value="sin_senal" ${d.subStatus === "sin_senal" ? "selected" : ""}>Sin señal</option>
              <option value="mantenimiento" ${d.subStatus === "mantenimiento" ? "selected" : ""}>Mantenimiento</option>
              <option value="cargando" ${d.subStatus === "cargando" ? "selected" : ""}>En base · Cargando</option>
            </select>
          </div>

          ${d.type === "drone" ? `
            <div class="field recording-group ${d.status === "in_mission" ? "visible" : ""}">
              <label>Lugar de grabación</label>
              <select onchange="if(this.value) startRecording('${d.id}', this.value)">
                <option value="">Seleccionar lugar...</option>
                ${CAMPUS_POINTS.map(p => `<option value="${p}">${p}</option>`).join("")}
              </select>
            </div>
          ` : ""}

          <div class="buttons">
            ${d.type === "robot" ? `
              <button class="btn btn-primary" onclick="simulateRoute('${d.id}', '${d.type}')">Simular ruta</button>
            ` : ""}
            <button class="btn btn-secondary" onclick="sendTelemetry(${JSON.stringify(d).replace(/"/g, "&quot;")})">Enviar telemetría</button>
          </div>

          ${d.type === "robot" ? `
            <div class="field" style="margin-top:12px">
              <label>Km acumulados</label>
              <input type="number" value="${d.accumulatedKm}" step="0.1" min="0"
                onchange="updateDevice('${d.id}', { accumulatedKm: parseFloat(this.value) })">
            </div>
          ` : `
            <div class="field" style="margin-top:12px">
              <label>Horas de vuelo</label>
              <input type="number" value="${d.flightHours}" step="0.1" min="0"
                onchange="updateDevice('${d.id}', { flightHours: parseFloat(this.value) })">
            </div>
          `}
        </div>
      `).join("");

      document.querySelectorAll("select").forEach(sel => {
        sel.addEventListener("change", () => {
          const card = sel.closest(".card");
          const subField = card.querySelector(".sub-status-group");
          const recField = card.querySelector(".recording-group");
          const statusSelect = card.querySelector("select:first-of-type + select");
          const statusVal = card.querySelector("select") ? card.querySelector("select").value : "";
          const selects = card.querySelectorAll("select");
          const status = selects[0] ? selects[0].value : "";
          if (subField) {
            subField.classList.toggle("visible", status === "blocked");
          }
          if (recField) {
            recField.classList.toggle("visible", status === "in_mission");
          }
        });
      });
    }

    fetchDevices();
    setInterval(fetchDevices, 3000);
  </script>
</body>
</html>
